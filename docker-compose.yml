services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: upgodown
      POSTGRES_PASSWORD: upgodown
      POSTGRES_DB: upgodown
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"

  api:
    build: .
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - seq
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=upgodown;Username=upgodown;Password=upgodown"
      Seq__Url: "http://seq:80"
      Jwt__Key: "UpGoDown-Super-Secret-Key-Change-In-Production-32chars!"
      Jwt__Issuer: "UpGoDown"
      Jwt__Audience: "UpGoDown"

volumes:
  pgdata:
